name: Redeploy Home

on:
  push:
    branches:
      - master
      - develop

jobs:
  redeploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Prod (master)
        if: github.ref == 'refs/heads/master'
        run: |
          cd ~/server/prod/apps/home
          docker compose restart home

      - name: Deploy Dev (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          cd ~/server/dev/apps/home
          docker compose restart home